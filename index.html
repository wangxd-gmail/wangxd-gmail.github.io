<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 福州大学教授</title>
    <!-- 学术风格字体与干净布局 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* ——— ★ 真正的布纹背景 ★ ——— */
            background-color: #e8e4de;
            background-image: 
                /* 经线（垂直纹理） */
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 3px,
                    rgba(200, 190, 180, 0.15) 3px,
                    rgba(200, 190, 180, 0.15) 4px
                ),
                /* 纬线（水平纹理） */
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 5px,
                    rgba(200, 190, 180, 0.10) 5px,
                    rgba(200, 190, 180, 0.10) 6px
                ),
                /* 斜纹交叉（布纹核心） */
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 6px,
                    rgba(190, 180, 170, 0.06) 6px,
                    rgba(190, 180, 170, 0.06) 7px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 6px,
                    rgba(190, 180, 170, 0.06) 6px,
                    rgba(190, 180, 170, 0.06) 7px
                ),
                /* 细微噪点增加织物感 */
                repeating-conic-gradient(
                    rgba(180, 170, 160, 0.02) 0% 25%,
                    transparent 0% 50%
                );
            background-size: 
                4px 100%,
                100% 6px,
                12px 12px,
                12px 12px,
                8px 8px;
            color: #1e293b;
            line-height: 1.6;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.12), 0 4px 18px rgba(0,0,0,0.04);
            padding: 2.5rem 2.8rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(2px);
        }
        @media (max-width: 700px) {
            .container {
                padding: 1.8rem 1.2rem;
            }
        }

        /* 头部区域：姓名 + 头衔 + 图片 */
        .profile-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eef2f6;
            padding-bottom: 1.8rem;
            margin-bottom: 2rem;
            gap: 1.5rem;
        }
        .name-title {
            flex: 2 1 300px;
        }
        .name-title h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #0b2b4a;
            line-height: 1.2;
            margin-bottom: 0.3rem;
        }
        .name-title .title-role {
            font-size: 1.1rem;
            font-weight: 500;
            color: #2c5b7c;
            background: #e6f0f9;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            margin-top: 0.2rem;
        }
        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem 1rem;
            margin-top: 0.5rem;
        }
        .badge {
            background: #f1f5f9;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e4a6b;
            border: 1px solid #dce4ec;
        }
        .badge.highlight {
            background: #d6e7f5;
            border-color: #9bbdd9;
            color: #0e3a5a;
        }
    
        /* ========== 头像自适应修改区域 ========== */
      .profile-image {
    flex: 0 1 320px; /* 弹性自适应，不固定宽度，可缩小 */
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0.5rem;
    width: 100%;
    max-width: 420px; /* 大屏最大限制，可自行修改数值调整上限 */
}
.profile-image img {
    width: 100%;
    height: auto;
    border-radius: 0;
    border: 3px solid #e9f0f7;
    box-shadow: 0 8px 25px rgba(0, 20, 40, 0.10);
    background: #f0f5fb;
    display: block;
    transform: scale(1); /* 取消固定缩放，由容器自适应控制大小 */
}
/* 移动端自动缩小上限 */
@media (max-width: 650px) {
    .profile-image {
        max-width: 100%;
    }
    .profile-image img {
        border-width: 2px;
    }
}   
        /* ======================================= */
        /* 名片信息 */
        .info-card {
            display: grid;
            grid-template-columns: 1fr 2.2fr;
            gap: 0.6rem 1.5rem;
            background: #fafcfe;
            padding: 1.2rem 1.6rem;
            border-radius: 18px;
            border: 1px solid #e9edf2;
            margin: 1.5rem 0 2rem 0;
            font-size: 0.98rem;
        }
        .info-card .label {
            font-weight: 600;
            color: #334e68;
            opacity: 0.8;
        }
        .info-card .value {
            color: #1a2f44;
        }
    
        /* section 通用 */
        .section {
            margin-top: 2.2rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0b2b4a;
            letter-spacing: -0.01em;
            border-left: 6px solid #2e7ea1;
            padding-left: 1rem;
            margin-bottom: 1.2rem;
        }
        .section-sub {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1d4765;
            margin: 1.5rem 0 0.6rem 0;
        }
    
        p {
            margin-bottom: 0.8rem;
            color: #1f3a51;
        }
        ul, .paper-list {
            list-style: none;
            padding-left: 0;
        }
        ul li, .paper-list li {
            position: relative;
            padding-left: 1.6rem;
            margin-bottom: 0.4rem;
        }
        ul li::before {
            content: "•";
            color: #2e7ea1;
            font-weight: 700;
            position: absolute;
            left: 0.2rem;
        }
        .paper-list li {
            padding-left: 2rem;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .paper-list li::before {
            content: "📄";
            position: absolute;
            left: 0;
            opacity: 0.7;
        }
    
        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 1.8rem;
        }
        @media (max-width: 650px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
        }
    
        .highlight-box {
            background: #f2f8fe;
            padding: 0.8rem 1.6rem;
            border-radius: 18px;
            border-left: 5px solid #3c87ae;
            margin: 1.2rem 0;
        }
    
        hr {
            border: none;
            border-top: 1px solid #dee5ed;
            margin: 1.8rem 0;
        }
    
        .footer-meta {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: #5b6f83;
            border-top: 1px solid #e2e9f1;
            padding-top: 1.5rem;
            text-align: center;
        }
        .footer-meta a {
            color: #2a6790;
            text-decoration: none;
            border-bottom: 1px dotted #b3c9db;
        }
    
        .tag {
            background: #eef4fa;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1b4b6a;
            display: inline-block;
            margin-right: 0.3rem;
        }
    
        .ref-list {
            font-size: 0.9rem;
            color: #1f3f59;
            list-style: none;
            padding-left: 0;
            columns: 2 260px;
            column-gap: 2rem;
        }
        .ref-list li {
            margin-bottom: 0.3rem;
            padding-left: 1.6rem;
            position: relative;
            break-inside: avoid;
        }
        .ref-list li::before {
            content: "[";
            color: #3c7fa0;
            font-weight: 500;
            position: absolute;
            left: 0;
        }
        .ref-list li::after {
            content: "]";
            color: #3c7fa0;
            font-weight: 500;
            position: absolute;
            left: 0.9rem;
        }
    
        /* 新增：图注说明 */
        .img-caption {
            font-size: 0.8rem;
            color: #3d627f;
            text-align: center;
            margin-top: 0.3rem;
        }
        .image-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
	
<!-- 头部：包含图片区域 -->
<div class="profile-header">		
	 <div style="display: flex; justify-content: center;margin: 30px 90px 10px 30px;">
         <img src="img/0605-006.jpg"
         alt="王晓东教授" width="492" height="503"
         id="profilePhoto" width: 130px height: auto>
    </div>		
  <div class="name-title">
    <h1> 🧑‍🏫 福州大学教授 王晓东 </h1>
		<br><br>
    <div class="badge-group" style="center; margin-top: .8rem;">
    <span class="badge highlight">🏫 福州大学</span><span class="badge highlight"> 📚计算机算法设计与分析</span><span class="badge highlight">🏫 福建省计算机学会理事长</span></div>
  </div>
</div>
    

</body>
</html>
